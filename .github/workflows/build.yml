name: Build firmware

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: firmware-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NCS_VERSION: v3.1.0
  ZEPHYR_SDK_VERSION: 0.17.4
  BOARD: promicro_nrf52840
  NCS_DIR: ncs
  BUILD_DIR: build

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      # 1. 코드 가져오기
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 3. 시스템 패키지 (매번 실행하지만 빠름)
      - name: Install system deps
        run: |
          sudo apt update
          sudo apt install -y \
            git cmake ninja-build gperf ccache dfu-util \
            device-tree-compiler wget xz-utils file make \
            gcc gcc-multilib g++-multilib python3-dev \
            python3-venv libsdl2-dev libmagic1

      # 4. west 설치
      - name: Install west
        run: |
          python -m pip install --upgrade pip
          python -m pip install west

      # 5. Zephyr SDK 캐시
      - name: Cache Zephyr SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: ~/zephyr-sdk-${{ env.ZEPHYR_SDK_VERSION }}
          key: sdk-${{ runner.os }}-${{ env.ZEPHYR_SDK_VERSION }}

      # 6. Zephyr SDK 설치 (cache miss 시)
      - name: Install Zephyr SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          wget -q https://github.com/zephyrproject-rtos/sdk-ng/releases/download/v${{ env.ZEPHYR_SDK_VERSION }}/zephyr-sdk-${{ env.ZEPHYR_SDK_VERSION }}_linux-x86_64_minimal.tar.xz
          tar xf zephyr-sdk-${{ env.ZEPHYR_SDK_VERSION }}_linux-x86_64_minimal.tar.xz -C ~/
          ~/zephyr-sdk-${{ env.ZEPHYR_SDK_VERSION }}/setup.sh -c -t arm-zephyr-eabi

      # 7. SDK 등록 (항상 실행)
      - name: Register SDK
        run: |
          ~/zephyr-sdk-${{ env.ZEPHYR_SDK_VERSION }}/setup.sh -c -t arm-zephyr-eabi

      # 8. NCS 캐시 (핵심)
      - name: Cache NCS workspace
        id: cache-ncs
        uses: actions/cache@v4
        with:
          path: |
            ncs/.west
            ncs/bootloader
            ncs/modules
            ncs/nrf
            ncs/nrfxlib
            ncs/tools
            ncs/zephyr
          key: ncs-${{ runner.os }}-${{ env.NCS_VERSION }}

      # 9. NCS 다운로드 (처음 1번만)
      - name: Fetch NCS
        if: steps.cache-ncs.outputs.cache-hit != 'true'
        run: |
          west init -m https://github.com/nrfconnect/sdk-nrf --mr ${NCS_VERSION} ${NCS_DIR}
          cd ${NCS_DIR}
          west update --narrow -o=--depth=1

      # 10. pip 캐시
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles(format('{0}/zephyr/scripts/requirements.txt', env.NCS_DIR)) }}
          restore-keys: |
            pip-${{ runner.os }}-

      # 11. Zephyr export + deps
      - name: Setup Zephyr env
        run: |
          cd ${NCS_DIR}
          west zephyr-export
          python -m pip install -r zephyr/scripts/requirements.txt

      # 12. 🔥 빌드 (핵심)
      - name: Build firmware
        run: |
          cd ${NCS_DIR}
          west build --sysbuild -p always \
            -b ${BOARD} \
            .. \
            -d ../${BUILD_DIR}

      # 13. 결과 확인 (디버깅용)
      - name: List outputs
        run: |
          find ${BUILD_DIR} -maxdepth 5 -type f | sort

      # 14. 결과 업로드
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ github.sha }}
          path: |
            build/**/zephyr.hex
            build/**/zephyr.bin
            build/**/zephyr.signed.bin
            build/**/zephyr.signed.hex
            build/**/merged.hex
            build/**/mcuboot*.hex
            build/**/domains.yaml
          if-no-files-found: error
