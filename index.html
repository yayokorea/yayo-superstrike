<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ProMicro BLE Dashboard</title>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-TCE72LXVC2"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());

        gtag('config', 'G-TCE72LXVC2');
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');

        :root {
            --bg: #09090b;
            --card-bg: rgba(24, 24, 27, 0.6);
            --border: rgba(255, 255, 255, 0.08);
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --radius: 24px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            padding: 16px;
            background-image:
                radial-gradient(circle at 0% 0%, rgba(59, 130, 246, 0.12) 0%, transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(16, 185, 129, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.02) 0%, transparent 60%);
            background-attachment: fixed;
            background-size: cover;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Scrollbar styles */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        /* Dashboard Grid Layout ( 화면 전체를 넓게 사용하는 반응형 그리드 ) */
        .dashboard {
            width: 100%;
            max-width: 1600px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
        }

        /* 태블릿 크기 이상 (2단 화면) */
        @media (min-width: 768px) {
            body {
                padding: 24px 32px;
            }

            .dashboard {
                grid-template-columns: repeat(2, 1fr);
                gap: 24px;
            }

            .header-section,
            .status-banner {
                grid-column: span 2;
            }

            .card-calib {
                grid-column: span 2;
            }
        }

        /* 데스크탑 크기 이상 (3단 화면으로 최대로 넓게 씀) */
        @media (min-width: 1024px) {
            body {
                padding: 32px 48px;
            }

            .dashboard {
                grid-template-columns: repeat(3, 1fr);
                gap: 32px;
            }

            .header-section,
            .status-banner {
                grid-column: span 3;
            }

            .card-sensors {
                grid-column: span 1;
            }

            .card-controls {
                grid-column: span 1;
            }

            .card-calib {
                grid-column: span 1;
            }
        }

        /* 컴포넌트 스타일 */
        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            padding: 10px 0 0 0;
            margin-bottom: -10px;
        }

        .title-area h1 {
            font-size: 2.8rem;
            font-weight: 800;
            line-height: 1.1;
            background: linear-gradient(135deg, #ffffff 30%, #93c5fd 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .title-area p {
            color: var(--text-muted);
            font-size: 1.15rem;
            margin-top: 6px;
            font-weight: 400;
        }

        .status-banner {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 100px;
            padding: 14px 32px;
            display: flex;
            align-items: center;
            gap: 12px;
            justify-content: center;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .status-banner.connected {
            background: rgba(16, 185, 129, 0.1);
            border-color: rgba(16, 185, 129, 0.3);
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--text-muted);
            transition: all 0.3s;
        }

        .status-dot.connected {
            background: var(--success);
            box-shadow: 0 0 16px var(--success);
        }

        .status-dot.active {
            background: var(--primary);
            box-shadow: 0 0 20px var(--primary);
            animation: pulse 0.8s infinite alternate;
        }

        @keyframes pulse {
            0% {
                transform: scale(0.9);
                opacity: 0.8;
            }

            100% {
                transform: scale(1.4);
                opacity: 1;
            }
        }

        #statusText {
            font-weight: 600;
            font-size: 1.05rem;
            color: #fff;
            letter-spacing: 0.5px;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 28px;
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .card:hover {
            border-color: rgba(255, 255, 255, 0.15);
        }

        .card-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #fff;
        }

        .card-title::before {
            content: '';
            width: 5px;
            height: 22px;
            background: var(--primary);
            border-radius: 4px;
        }

        /* Buttons */
        .btn {
            border: none;
            border-radius: 16px;
            font-family: inherit;
            font-size: 1.05rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 16px 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            line-height: 1.2;
        }

        .btn:active:not(:disabled) {
            transform: scale(0.96);
        }

        .btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }

        .btn-main {
            background: linear-gradient(135deg, #3b82f6, #4f46e5);
            box-shadow: 0 4px 25px rgba(59, 130, 246, 0.4);
            padding: 16px 40px;
        }

        .btn-main:hover:not(:disabled) {
            box-shadow: 0 8px 30px rgba(59, 130, 246, 0.6);
        }

        .btn-main.disconnect {
            background: #1e293b;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
            color: #e2e8f0;
        }

        .btn-green {
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid rgba(16, 185, 129, 0.4);
            color: #34d399;
        }

        .btn-red {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.4);
            color: #f87171;
        }

        .btn-outline {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #e2e8f0;
        }

        .btn-orange {
            background: rgba(245, 158, 11, 0.15);
            border: 1px solid rgba(245, 158, 11, 0.4);
            color: #fbbf24;
        }

        .btn-gray {
            background: rgba(100, 116, 139, 0.15);
            border: 1px solid rgba(100, 116, 139, 0.4);
            color: #94a3b8;
        }

        .btn-full {
            width: 100%;
            margin-top: auto;
        }

        .cal-btn {
            background: rgba(56, 189, 248, 0.1);
            border: 1px solid rgba(56, 189, 248, 0.3);
            color: #bae6fd;
            font-size: 0.95rem;
        }

        .cal-btn.press {
            background: rgba(14, 165, 233, 0.15);
            border: 1px solid rgba(14, 165, 233, 0.4);
            color: #7dd3fc;
        }

        /* Sensors Map */
        .sensor-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
            flex-grow: 1;
        }

        .sensor-box {
            background: rgba(0, 0, 0, 0.25);
            border-radius: 20px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.04);
            flex-grow: 1;
        }

        .sensor-box.temp {
            padding: 32px;
            background: linear-gradient(180deg, rgba(0, 0, 0, 0.1), rgba(0, 0, 0, 0.3));
        }

        .sensor-box .val {
            font-size: 2.2rem;
            font-weight: 800;
            color: #fff;
            margin-bottom: 6px;
        }

        .sensor-box.temp .val {
            font-size: 3.5rem;
            color: #60a5fa;
            text-shadow: 0 0 30px rgba(96, 165, 250, 0.4);
            letter-spacing: -1px;
        }

        .sensor-box .lbl {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 1.5px;
        }

        .sensor-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        /* Controls Area */
        .led-control {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 24px;
            background: rgba(0, 0, 0, 0.25);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        .led-btns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            flex-grow: 1;
        }

        .led-ring {
            width: 68px;
            height: 68px;
            border-radius: 50%;
            background: #0f172a;
            border: 3px solid #334155;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            flex-shrink: 0;
        }

        .led-core {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            transition: all 0.4s;
            filter: blur(2px);
        }

        .led-ring.on {
            border-color: #38bdf8;
            box-shadow: 0 0 30px rgba(56, 189, 248, 0.5), inset 0 0 15px rgba(56, 189, 248, 0.3);
            background: #0284c7;
        }

        .led-ring.on .led-core {
            background: #fff;
            box-shadow: 0 0 20px #fff;
            filter: blur(0px);
        }

        .action-grid,
        .cal-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
        }

        /* Calibration Status view */
        .cal-status {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 24px;
            font-family: 'Consolas', monospace;
            font-size: 0.95rem;
            color: #cbd5e1;
            line-height: 1.7;
            white-space: pre-wrap;
            margin-bottom: 24px;
            flex-grow: 1;
            box-shadow: inset 0 5px 15px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>

<body>

    <div class="dashboard">

        <!-- Header -->
        <header class="header-section">
            <div class="title-area">
                <h1>ProMicro</h1>
                <p>BLE Control Dashboard</p>
            </div>
            <button id="connectBtn" class="btn btn-main">기기 연결하기</button>
        </header>

        <!-- Status Banner -->
        <div id="statusBadge" class="status-banner">
            <div id="statusDot" class="status-dot"></div>
            <span id="statusText">블루투스 기기 연결 대기 중</span>
        </div>

        <!-- Sensor Card -->
        <div class="card card-sensors">
            <h2 class="card-title">실시간 데이터 센서</h2>
            <div class="sensor-grid">
                <div class="sensor-box temp">
                    <div class="val" id="tempDisplay">--.-- °C</div>
                    <div class="lbl">현재 온도</div>
                </div>
                <div class="sensor-row">
                    <div class="sensor-box">
                        <div class="val" id="hall1Display">--</div>
                        <div class="lbl">Hall 1</div>
                    </div>
                    <div class="sensor-box">
                        <div class="val" id="hall2Display">--</div>
                        <div class="lbl">Hall 2</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Action Card -->
        <div class="card card-controls">
            <h2 class="card-title">기능 및 장치 제어</h2>

            <div class="led-control">
                <div id="ledIndicator" class="led-ring">
                    <div class="led-core"></div>
                </div>
                <div class="led-btns">
                    <button id="ledOnBtn" class="btn btn-green" disabled>LED 켜기</button>
                    <button id="ledOffBtn" class="btn btn-red" disabled>LED 끄기</button>
                </div>
            </div>

            <div class="action-grid">
                <button id="vibShortBtn" class="btn btn-outline" disabled>짧은 진동</button>
                <button id="vibLongBtn" class="btn btn-outline" disabled>긴 진동</button>
                <button id="switchOnBtn" class="btn btn-orange" disabled>스위치 누르기</button>
                <button id="switchOffBtn" class="btn btn-gray" disabled>스위치 떼기</button>
            </div>
        </div>

        <!-- Calibration Card -->
        <div class="card card-calib">
            <h2 class="card-title">홀 센서 트리거 캘리브레이션</h2>

            <div id="calibrationSummary" class="cal-status">기기를 연결하여 캘리브레이션 정보를 동기화하세요.</div>

            <div class="cal-grid">
                <button id="calHall1IdleBtn" class="btn cal-btn" disabled>H1 Idle 설정</button>
                <button id="calHall1PressBtn" class="btn cal-btn press" disabled>H1 Press 설정</button>
                <button id="calHall2IdleBtn" class="btn cal-btn" disabled>H2 Idle 설정</button>
                <button id="calHall2PressBtn" class="btn cal-btn press" disabled>H2 Press 설정</button>
            </div>

            <button id="refreshCalBtn" class="btn btn-outline btn-full" disabled>현재 캘리브레이션 상태 읽기</button>
        </div>

    </div>

    <script>
        const SERVICE_UUID = '2cfd0a83-f013-4fe2-8dbd-fe3a5f4a64ff';
        const CHARACTERISTIC_UUID_LED = '2cfd0a84-f013-4fe2-8dbd-fe3a5f4a64ff';
        const CHARACTERISTIC_UUID_TEMP = '2cfd0a85-f013-4fe2-8dbd-fe3a5f4a64ff';
        const CHARACTERISTIC_UUID_MOTOR = '2cfd0a86-f013-4fe2-8dbd-fe3a5f4a64ff';
        const CHARACTERISTIC_UUID_HALL1 = '2cfd0a87-f013-4fe2-8dbd-fe3a5f4a64ff';
        const CHARACTERISTIC_UUID_HALL2 = '2cfd0a88-f013-4fe2-8dbd-fe3a5f4a64ff';
        const CHARACTERISTIC_UUID_SWITCH = '2cfd0a89-f013-4fe2-8dbd-fe3a5f4a64ff';
        const CHARACTERISTIC_UUID_CAL_STATUS = '2cfd0a8a-f013-4fe2-8dbd-fe3a5f4a64ff';
        const CHARACTERISTIC_UUID_CAL_COMMAND = '2cfd0a8b-f013-4fe2-8dbd-fe3a5f4a64ff';

        const CAL_CMD_HALL1_IDLE = 1;
        const CAL_CMD_HALL1_PRESS = 2;
        const CAL_CMD_HALL2_IDLE = 3;
        const CAL_CMD_HALL2_PRESS = 4;

        let bluetoothDevice = null;
        let ledCharacteristic = null;
        let tempCharacteristic = null;
        let motorCharacteristic = null;
        let hall1Characteristic = null;
        let hall2Characteristic = null;
        let switchCharacteristic = null;
        let calibrationStatusCharacteristic = null;
        let calibrationCommandCharacteristic = null;

        const connectBtn = document.getElementById('connectBtn');
        const ledOnBtn = document.getElementById('ledOnBtn');
        const ledOffBtn = document.getElementById('ledOffBtn');
        const vibShortBtn = document.getElementById('vibShortBtn');
        const vibLongBtn = document.getElementById('vibLongBtn');
        const switchOnBtn = document.getElementById('switchOnBtn');
        const switchOffBtn = document.getElementById('switchOffBtn');
        const calHall1IdleBtn = document.getElementById('calHall1IdleBtn');
        const calHall1PressBtn = document.getElementById('calHall1PressBtn');
        const calHall2IdleBtn = document.getElementById('calHall2IdleBtn');
        const calHall2PressBtn = document.getElementById('calHall2PressBtn');
        const refreshCalBtn = document.getElementById('refreshCalBtn');
        const calibrationSummary = document.getElementById('calibrationSummary');
        const statusText = document.getElementById('statusText');
        const statusBadge = document.getElementById('statusBadge');
        const statusDot = document.getElementById('statusDot');
        const ledIndicator = document.getElementById('ledIndicator');

        function updateUI(state) {
            switch (state) {
                case 'disconnected':
                    statusText.innerText = '블루투스 기기 연결 대기 중';
                    statusBadge.className = 'status-banner';
                    statusDot.className = 'status-dot';
                    connectBtn.innerText = '기기 연결하기';
                    connectBtn.classList.remove('disconnect');

                    ledOnBtn.disabled = true;
                    ledOffBtn.disabled = true;
                    vibShortBtn.disabled = true;
                    vibLongBtn.disabled = true;
                    switchOnBtn.disabled = true;
                    switchOffBtn.disabled = true;
                    calHall1IdleBtn.disabled = true;
                    calHall1PressBtn.disabled = true;
                    calHall2IdleBtn.disabled = true;
                    calHall2PressBtn.disabled = true;
                    refreshCalBtn.disabled = true;
                    ledIndicator.classList.remove('on');
                    break;
                case 'connecting':
                    statusText.innerText = '블루투스 기기 연결 시도 중...';
                    statusBadge.className = 'status-banner';
                    statusDot.className = 'status-dot';
                    break;
                case 'connected':
                    statusText.innerText = '블루투스 기기 연결 성공!';
                    statusBadge.className = 'status-banner connected';
                    statusDot.className = 'status-dot connected';
                    connectBtn.innerText = '기기 연결 해제';
                    connectBtn.classList.add('disconnect');

                    ledOnBtn.disabled = false;
                    ledOffBtn.disabled = false;
                    vibShortBtn.disabled = false;
                    vibLongBtn.disabled = false;
                    switchOnBtn.disabled = false;
                    switchOffBtn.disabled = false;
                    calHall1IdleBtn.disabled = false;
                    calHall1PressBtn.disabled = false;
                    calHall2IdleBtn.disabled = false;
                    calHall2PressBtn.disabled = false;
                    refreshCalBtn.disabled = false;
                    break;
                case 'transmitting':
                    statusDot.className = 'status-dot active';
                    setTimeout(() => {
                        if (bluetoothDevice && bluetoothDevice.gatt.connected) {
                            statusDot.className = 'status-dot connected';
                        }
                    }, 500);
                    break;
            }
        }

        async function toggleConnection() {
            if (bluetoothDevice && bluetoothDevice.gatt.connected) {
                bluetoothDevice.gatt.disconnect();
            } else {
                await connectToDevice();
            }
        }

        async function connectToDevice() {
            try {
                updateUI('connecting');

                bluetoothDevice = await navigator.bluetooth.requestDevice({
                    filters: [{ services: [SERVICE_UUID] }]
                });

                bluetoothDevice.addEventListener('gattserverdisconnected', onDisconnected);

                const server = await bluetoothDevice.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                ledCharacteristic = await service.getCharacteristic(CHARACTERISTIC_UUID_LED);
                tempCharacteristic = await service.getCharacteristic(CHARACTERISTIC_UUID_TEMP);
                motorCharacteristic = await service.getCharacteristic(CHARACTERISTIC_UUID_MOTOR);
                hall1Characteristic = await service.getCharacteristic(CHARACTERISTIC_UUID_HALL1);
                hall2Characteristic = await service.getCharacteristic(CHARACTERISTIC_UUID_HALL2);
                switchCharacteristic = await service.getCharacteristic(CHARACTERISTIC_UUID_SWITCH);
                calibrationStatusCharacteristic = await service.getCharacteristic(CHARACTERISTIC_UUID_CAL_STATUS);
                calibrationCommandCharacteristic = await service.getCharacteristic(CHARACTERISTIC_UUID_CAL_COMMAND);

                await tempCharacteristic.startNotifications();
                tempCharacteristic.addEventListener('characteristicvaluechanged', handleTemperatureChange);

                await hall1Characteristic.startNotifications();
                hall1Characteristic.addEventListener('characteristicvaluechanged', (e) => {
                    const val = e.target.value.getInt32(0, true);
                    document.getElementById('hall1Display').innerText = val;
                });

                await hall2Characteristic.startNotifications();
                hall2Characteristic.addEventListener('characteristicvaluechanged', (e) => {
                    const val = e.target.value.getInt32(0, true);
                    document.getElementById('hall2Display').innerText = val;
                });

                updateUI('connected');
                await refreshCalibrationStatus();
                console.log('BLE Connected');
            } catch (error) {
                console.error('Connection failed:', error);
                updateUI('disconnected');
            }
        }

        function onDisconnected() {
            console.log('BLE Disconnected');
            ledCharacteristic = null;
            motorCharacteristic = null;
            if (tempCharacteristic) {
                tempCharacteristic.removeEventListener('characteristicvaluechanged', handleTemperatureChange);
                tempCharacteristic = null;
            }
            if (hall1Characteristic) hall1Characteristic = null;
            if (hall2Characteristic) hall2Characteristic = null;
            if (switchCharacteristic) switchCharacteristic = null;
            if (calibrationStatusCharacteristic) calibrationStatusCharacteristic = null;
            if (calibrationCommandCharacteristic) calibrationCommandCharacteristic = null;
            updateUI('disconnected');
        }

        function handleTemperatureChange(event) {
            const value = event.target.value;
            const tempEncoded = value.getInt32(0, true);
            const tempFloat = (tempEncoded / 100).toFixed(2);
            document.getElementById('tempDisplay').innerText = tempFloat + ' °C';
        }

        function updateCalibrationSummary(status) {
            calibrationSummary.innerHTML =
                `[ Hall Sensor 1 - Left  ] Ready: ${status.hall1Ready ? '✅' : '❌'}
 Idle: ${status.hall1Idle} | Press: ${status.hall1Press} | Thres: ${status.hall1Threshold} | Rel: ${status.hall1Release}

[ Hall Sensor 2 - Right ] Ready: ${status.hall2Ready ? '✅' : '❌'}
 Idle: ${status.hall2Idle} | Press: ${status.hall2Press} | Thres: ${status.hall2Threshold} | Rel: ${status.hall2Release}

> Active Command: ${status.activeCommand}  > Samples Collected: ${status.sampleCount}/8`;
        }

        async function refreshCalibrationStatus() {
            if (!calibrationStatusCharacteristic) return;

            const value = await calibrationStatusCharacteristic.readValue();
            const status = {
                hall1Idle: value.getInt32(0, true),
                hall1Press: value.getInt32(4, true),
                hall1Threshold: value.getInt32(8, true),
                hall1Release: value.getInt32(12, true),
                hall2Idle: value.getInt32(16, true),
                hall2Press: value.getInt32(20, true),
                hall2Threshold: value.getInt32(24, true),
                hall2Release: value.getInt32(28, true),
                activeCommand: value.getUint8(32),
                sampleCount: value.getUint8(33),
                hall1Ready: value.getUint8(34) === 1,
                hall2Ready: value.getUint8(35) === 1
            };

            updateCalibrationSummary(status);
        }

        async function sendCalibrationCommand(command) {
            if (!calibrationCommandCharacteristic) return;

            try {
                calHall1IdleBtn.disabled = true;
                calHall1PressBtn.disabled = true;
                calHall2IdleBtn.disabled = true;
                calHall2PressBtn.disabled = true;
                refreshCalBtn.disabled = true;
                updateUI('transmitting');
                await calibrationCommandCharacteristic.writeValue(new Uint8Array([command]));
                await new Promise(resolve => setTimeout(resolve, 500));
                await refreshCalibrationStatus();
            } catch (error) {
                console.error('Calibration failed:', error);
                alert('캘리 명령 실패: ' + error.message);
            } finally {
                if (bluetoothDevice && bluetoothDevice.gatt.connected) {
                    calHall1IdleBtn.disabled = false;
                    calHall1PressBtn.disabled = false;
                    calHall2IdleBtn.disabled = false;
                    calHall2PressBtn.disabled = false;
                    refreshCalBtn.disabled = false;
                }
            }
        }

        async function sendLedCommand(value) {
            if (!ledCharacteristic) {
                alert('기기가 연결되어 있지 않습니다.');
                return;
            }

            try {
                ledOnBtn.disabled = true;
                ledOffBtn.disabled = true;

                updateUI('transmitting');
                let data = new Uint8Array([value]);

                await ledCharacteristic.writeValue(data);

                if (value === 1) {
                    ledIndicator.classList.add('on');
                } else {
                    ledIndicator.classList.remove('on');
                }
            } catch (error) {
                console.error('Send failed:', error);
                alert('전송에 실패했습니다: ' + error.message);
            } finally {
                ledOnBtn.disabled = false;
                ledOffBtn.disabled = false;
            }
        }

        async function playVibration(intensity, duration) {
            if (!motorCharacteristic) return;
            try {
                vibShortBtn.disabled = true;
                vibLongBtn.disabled = true;
                updateUI('transmitting');
                await motorCharacteristic.writeValue(new Uint8Array([intensity]));
                setTimeout(async () => {
                    if (motorCharacteristic) {
                        try {
                            await motorCharacteristic.writeValue(new Uint8Array([0]));
                        } catch (err) { }
                    }
                    vibShortBtn.disabled = false;
                    vibLongBtn.disabled = false;
                }, duration);
            } catch (error) {
                console.error('Vibration failed:', error);
                vibShortBtn.disabled = false;
                vibLongBtn.disabled = false;
            }
        }

        async function sendSwitchCommand(value) {
            if (!switchCharacteristic) return;
            try {
                switchOnBtn.disabled = true;
                switchOffBtn.disabled = true;
                updateUI('transmitting');
                await switchCharacteristic.writeValue(new Uint8Array([value]));
            } catch (error) {
                console.error('Switch failed:', error);
            } finally {
                switchOnBtn.disabled = false;
                switchOffBtn.disabled = false;
            }
        }

        connectBtn.addEventListener('click', toggleConnection);
        ledOnBtn.addEventListener('click', () => sendLedCommand(1));
        ledOffBtn.addEventListener('click', () => sendLedCommand(0));
        vibShortBtn.addEventListener('click', () => playVibration(200, 50));
        vibLongBtn.addEventListener('click', () => playVibration(200, 300));
        switchOnBtn.addEventListener('click', () => sendSwitchCommand(1));
        switchOffBtn.addEventListener('click', () => sendSwitchCommand(0));
        calHall1IdleBtn.addEventListener('click', () => sendCalibrationCommand(CAL_CMD_HALL1_IDLE));
        calHall1PressBtn.addEventListener('click', () => sendCalibrationCommand(CAL_CMD_HALL1_PRESS));
        calHall2IdleBtn.addEventListener('click', () => sendCalibrationCommand(CAL_CMD_HALL2_IDLE));
        calHall2PressBtn.addEventListener('click', () => sendCalibrationCommand(CAL_CMD_HALL2_PRESS));
        refreshCalBtn.addEventListener('click', refreshCalibrationStatus);
    </script>
</body>

</html>
