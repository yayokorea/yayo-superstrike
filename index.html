<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ProMicro BLE Web Control</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');

        * {
            box-sizing: border-box;
            /* 패딩과 테두리가 너비를 초과하지 않도록 설정 */
        }

        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --success: #00e676;
            --danger: #ff1744;
            --bg-dark: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        /* HTML과 BODY 영역을 뷰포트 크기로 단단히 고정 */
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            max-width: 100vw;
            min-height: 100vh;
            overflow-x: hidden;
            /* 가로 스크롤 및 빈 공간 완벽 차단 */
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top left, #1e1e24, var(--bg-dark), #000000);
            color: white;
            overscroll-behavior-y: none;
            /* 모바일에서 당겨서 새로고침 되는 현상 방지 */
        }

        /* 화면을 꽉 채우고 요소들을 중앙에 배치하는 래퍼 */
        .app-wrapper {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            width: 100%;
            overflow: hidden;
            /* 블롭 애니메이션이 래퍼 밖으로 나가는 것을 차단 */
        }

        /* Background animated blobs */
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            z-index: 0;
            animation: float 10s infinite alternate cubic-bezier(0.45, 0.05, 0.55, 0.95);
        }

        .blob-1 {
            width: 400px;
            height: 400px;
            background: var(--primary);
            top: -100px;
            left: -100px;
        }

        .blob-2 {
            width: 300px;
            height: 300px;
            background: var(--secondary);
            bottom: -50px;
            right: -50px;
            animation-delay: -5s;
        }

        @keyframes float {
            0% {
                transform: translate(0, 0) scale(1);
            }

            100% {
                transform: translate(30px, 50px) scale(1.1);
            }
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px 30px;
            /* 모바일 대응: 좌우 패딩을 살짝 줄임 */
            width: 90%;
            max-width: 420px;
            box-shadow: var(--glass-shadow);
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .glass-panel:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px 0 rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 2rem;
            margin: 0 0 10px 0;
            background: linear-gradient(90deg, #fff, #a5b4fc);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
            text-align: center;
        }

        p.subtitle {
            color: #94a3b8;
            font-size: 0.9rem;
            margin-bottom: 30px;
            text-align: center;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 20px;
            border-radius: 30px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            margin-bottom: 30px;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.4s ease;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #cbd5e1;
            box-shadow: 0 0 10px transparent;
            transition: all 0.4s ease;
        }

        .status-badge.connected {
            border-color: rgba(0, 230, 118, 0.4);
        }

        .status-badge.connected .status-dot {
            background: var(--success);
            box-shadow: 0 0 12px var(--success);
        }

        .status-badge.active .status-dot {
            background: var(--primary);
            box-shadow: 0 0 15px var(--primary);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(0, 210, 255, 0.7);
            }

            70% {
                box-shadow: 0 0 0 10px rgba(0, 210, 255, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(0, 210, 255, 0);
            }
        }

        .btn {
            width: 100%;
            padding: 16px;
            margin-bottom: 15px;
            border: none;
            border-radius: 14px;
            font-family: inherit;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            color: white;
            backdrop-filter: blur(5px);
            /* 모바일에서 탭 하이라이트 깜빡임 제거 */
            -webkit-tap-highlight-color: transparent;
        }

        .btn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.4s ease, height 0.4s ease;
        }

        /* 터치(모바일) 환경에서는 hover 효과를 조금 다르게 처리하는 것이 좋으나 기본적으로 유지 */
        @media (hover: hover) {
            .btn:hover::after {
                width: 300px;
                height: 300px;
            }
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn:disabled::after {
            display: none;
        }

        .btn-connect {
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            box-shadow: 0 4px 15px rgba(58, 123, 213, 0.4);
        }

        .btn-connect.disconnect {
            background: linear-gradient(135deg, #475569, #1e293b);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .controls-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
        }

        .btn-on {
            background: rgba(0, 230, 118, 0.2);
            border: 1px solid rgba(0, 230, 118, 0.4);
            color: #b9f6ca;
            margin: 0;
        }

        @media (hover: hover) {
            .btn-on:hover:not(:disabled) {
                background: rgba(0, 230, 118, 0.3);
                box-shadow: 0 0 20px rgba(0, 230, 118, 0.4);
            }
        }

        .btn-off {
            background: rgba(255, 23, 68, 0.2);
            border: 1px solid rgba(255, 23, 68, 0.4);
            color: #ff8a80;
            margin: 0;
        }

        @media (hover: hover) {
            .btn-off:hover:not(:disabled) {
                background: rgba(255, 23, 68, 0.3);
                box-shadow: 0 0 20px rgba(255, 23, 68, 0.4);
            }
        }

        .led-indicator {
            width: 80px;
            height: 80px;
            margin: 20px 0;
            border-radius: 50%;
            background: #1e293b;
            border: 4px solid #334155;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.5);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .led-indicator::before {
            content: '';
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            filter: blur(4px);
            transition: all 0.5s ease;
        }

        .led-indicator.on {
            background: #0ea5e9;
            border-color: #38bdf8;
            box-shadow: 0 0 40px #0ea5e9, inset 0 0 20px rgba(255, 255, 255, 0.8);
        }

        .led-indicator.on::before {
            background: rgba(255, 255, 255, 0.9);
            filter: blur(2px);
        }

        .sensor-card {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 15px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .sensor-label {
            font-size: 0.9rem;
            color: #94a3b8;
        }

        .sensor-value {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--primary);
        }
    </style>
</head>

<body>

    <div class="app-wrapper">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>

        <div class="glass-panel">
            <h1>ProMicro Control</h1>
            <p class="subtitle">Web Bluetooth Experience</p>

            <div id="statusBadge" class="status-badge">
                <div id="statusDot" class="status-dot"></div>
                <span id="statusText">연결 대기 중</span>
            </div>

            <div style="text-align: center; margin-bottom: 20px;">
                <div style="font-size: 0.9rem; color: #94a3b8; margin-bottom: 5px;">현재 온도</div>
                <div id="tempDisplay"
                    style="font-size: 2.5rem; font-weight: 800; color: var(--primary); text-shadow: 0 0 15px rgba(0, 210, 255, 0.4);">
                    --.-- °C</div>
            </div>

            <div id="ledIndicator" class="led-indicator"></div>

            <div class="sensor-card">
                <span class="sensor-label">Hall Sensor 1</span>
                <span id="hall1Display" class="sensor-value">--</span>
            </div>
            <div class="sensor-card">
                <span class="sensor-label">Hall Sensor 2</span>
                <span id="hall2Display" class="sensor-value">--</span>
            </div>

            <div class="sensor-card" style="display:block;">
                <div class="sensor-label" style="margin-bottom: 10px;">Hall Calibration</div>
                <div id="calibrationSummary" style="font-size: 0.85rem; color: #cbd5e1; line-height: 1.5;">
                    Hall1 L: idle -, press -, th -, rel -<br>
                    Hall2 R: idle -, press -, th -, rel -
                </div>
            </div>

            <button id="connectBtn" class="btn btn-connect">기기 연결하기</button>

            <div class="controls-grid">
                <button id="ledOnBtn" class="btn btn-on" disabled>LED 켜기</button>
                <button id="ledOffBtn" class="btn btn-off" disabled>LED 끄기</button>
                <button id="vibShortBtn" class="btn"
                    style="background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff;"
                    disabled>짧은 진동</button>
                <button id="vibLongBtn" class="btn"
                    style="background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff;"
                    disabled>긴 진동</button>
                <button id="switchOnBtn" class="btn" disabled
                    style="background: rgba(255, 152, 0, 0.2); border: 1px solid rgba(255, 152, 0, 0.4); color: #ffb74d;">스위치
                    누르기</button>
                <button id="switchOffBtn" class="btn" disabled
                    style="background: rgba(158, 158, 158, 0.2); border: 1px solid rgba(158, 158, 158, 0.4); color: #e0e0e0;">스위치
                    떼기</button>
            </div>
            <div class="controls-grid" style="margin-top: 15px;">
                <button id="calHall1IdleBtn" class="btn" disabled
                    style="background: rgba(56, 189, 248, 0.18); border: 1px solid rgba(56, 189, 248, 0.4); color: #bae6fd;">H1 Idle</button>
                <button id="calHall1PressBtn" class="btn" disabled
                    style="background: rgba(14, 165, 233, 0.18); border: 1px solid rgba(14, 165, 233, 0.4); color: #7dd3fc;">H1 Press</button>
                <button id="calHall2IdleBtn" class="btn" disabled
                    style="background: rgba(251, 146, 60, 0.18); border: 1px solid rgba(251, 146, 60, 0.4); color: #fed7aa;">H2 Idle</button>
                <button id="calHall2PressBtn" class="btn" disabled
                    style="background: rgba(249, 115, 22, 0.18); border: 1px solid rgba(249, 115, 22, 0.4); color: #fdba74;">H2 Press</button>
            </div>
            <button id="refreshCalBtn" class="btn"
                style="background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2); color: #fff; margin-top: 15px;"
                disabled>캘리 상태 읽기</button>
        </div>
    </div>

    <script>
        // Updated Custom UUIDs
        const SERVICE_UUID = '2cfd0a83-f013-4fe2-8dbd-fe3a5f4a64ff';
        const CHARACTERISTIC_UUID_LED = '2cfd0a84-f013-4fe2-8dbd-fe3a5f4a64ff';
        const CHARACTERISTIC_UUID_TEMP = '2cfd0a85-f013-4fe2-8dbd-fe3a5f4a64ff';
        const CHARACTERISTIC_UUID_MOTOR = '2cfd0a86-f013-4fe2-8dbd-fe3a5f4a64ff';
        const CHARACTERISTIC_UUID_HALL1 = '2cfd0a87-f013-4fe2-8dbd-fe3a5f4a64ff';
        const CHARACTERISTIC_UUID_HALL2 = '2cfd0a88-f013-4fe2-8dbd-fe3a5f4a64ff';
        const CHARACTERISTIC_UUID_SWITCH = '2cfd0a89-f013-4fe2-8dbd-fe3a5f4a64ff';
        const CHARACTERISTIC_UUID_CAL_STATUS = '2cfd0a8a-f013-4fe2-8dbd-fe3a5f4a64ff';
        const CHARACTERISTIC_UUID_CAL_COMMAND = '2cfd0a8b-f013-4fe2-8dbd-fe3a5f4a64ff';

        const CAL_CMD_HALL1_IDLE = 1;
        const CAL_CMD_HALL1_PRESS = 2;
        const CAL_CMD_HALL2_IDLE = 3;
        const CAL_CMD_HALL2_PRESS = 4;

        let bluetoothDevice = null;
        let ledCharacteristic = null;
        let tempCharacteristic = null;
        let motorCharacteristic = null;
        let hall1Characteristic = null;
        let hall2Characteristic = null;
        let switchCharacteristic = null;
        let calibrationStatusCharacteristic = null;
        let calibrationCommandCharacteristic = null;

        const connectBtn = document.getElementById('connectBtn');
        const ledOnBtn = document.getElementById('ledOnBtn');
        const ledOffBtn = document.getElementById('ledOffBtn');
        const vibShortBtn = document.getElementById('vibShortBtn');
        const vibLongBtn = document.getElementById('vibLongBtn');
        const switchOnBtn = document.getElementById('switchOnBtn');
        const switchOffBtn = document.getElementById('switchOffBtn');
        const calHall1IdleBtn = document.getElementById('calHall1IdleBtn');
        const calHall1PressBtn = document.getElementById('calHall1PressBtn');
        const calHall2IdleBtn = document.getElementById('calHall2IdleBtn');
        const calHall2PressBtn = document.getElementById('calHall2PressBtn');
        const refreshCalBtn = document.getElementById('refreshCalBtn');
        const calibrationSummary = document.getElementById('calibrationSummary');
        const statusText = document.getElementById('statusText');
        const statusBadge = document.getElementById('statusBadge');
        const ledIndicator = document.getElementById('ledIndicator');

        function updateUI(state) {
            switch (state) {
                case 'disconnected':
                    statusText.innerText = '연결 대기 중';
                    statusBadge.className = 'status-badge';
                    connectBtn.innerText = '기기 연결하기';
                    connectBtn.classList.remove('disconnect');

                    ledOnBtn.disabled = true;
                    ledOffBtn.disabled = true;
                    vibShortBtn.disabled = true;
                    vibLongBtn.disabled = true;
                    switchOnBtn.disabled = true;
                    switchOffBtn.disabled = true;
                    calHall1IdleBtn.disabled = true;
                    calHall1PressBtn.disabled = true;
                    calHall2IdleBtn.disabled = true;
                    calHall2PressBtn.disabled = true;
                    refreshCalBtn.disabled = true;
                    ledIndicator.classList.remove('on');
                    break;
                case 'connecting':
                    statusText.innerText = '연결 시도 중...';
                    statusBadge.className = 'status-badge';
                    break;
                case 'connected':
                    statusText.innerText = '연결 성공!';
                    statusBadge.className = 'status-badge connected';
                    connectBtn.innerText = '연결 해제하기';
                    connectBtn.classList.add('disconnect');

                    ledOnBtn.disabled = false;
                    ledOffBtn.disabled = false;
                    vibShortBtn.disabled = false;
                    vibLongBtn.disabled = false;
                    switchOnBtn.disabled = false;
                    switchOffBtn.disabled = false;
                    calHall1IdleBtn.disabled = false;
                    calHall1PressBtn.disabled = false;
                    calHall2IdleBtn.disabled = false;
                    calHall2PressBtn.disabled = false;
                    refreshCalBtn.disabled = false;
                    break;
                case 'transmitting':
                    statusBadge.className = 'status-badge connected active';
                    setTimeout(() => {
                        if (bluetoothDevice && bluetoothDevice.gatt.connected) {
                            statusBadge.className = 'status-badge connected';
                        }
                    }, 500);
                    break;
            }
        }

        async function toggleConnection() {
            if (bluetoothDevice && bluetoothDevice.gatt.connected) {
                bluetoothDevice.gatt.disconnect();
            } else {
                await connectToDevice();
            }
        }

        async function connectToDevice() {
            try {
                updateUI('connecting');

                bluetoothDevice = await navigator.bluetooth.requestDevice({
                    filters: [{ services: [SERVICE_UUID] }]
                });

                bluetoothDevice.addEventListener('gattserverdisconnected', onDisconnected);

                const server = await bluetoothDevice.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                ledCharacteristic = await service.getCharacteristic(CHARACTERISTIC_UUID_LED);
                tempCharacteristic = await service.getCharacteristic(CHARACTERISTIC_UUID_TEMP);
                motorCharacteristic = await service.getCharacteristic(CHARACTERISTIC_UUID_MOTOR);
                hall1Characteristic = await service.getCharacteristic(CHARACTERISTIC_UUID_HALL1);
                hall2Characteristic = await service.getCharacteristic(CHARACTERISTIC_UUID_HALL2);
                switchCharacteristic = await service.getCharacteristic(CHARACTERISTIC_UUID_SWITCH);
                calibrationStatusCharacteristic = await service.getCharacteristic(CHARACTERISTIC_UUID_CAL_STATUS);
                calibrationCommandCharacteristic = await service.getCharacteristic(CHARACTERISTIC_UUID_CAL_COMMAND);

                // Listen for notifications
                await tempCharacteristic.startNotifications();
                tempCharacteristic.addEventListener('characteristicvaluechanged', handleTemperatureChange);

                await hall1Characteristic.startNotifications();
                hall1Characteristic.addEventListener('characteristicvaluechanged', (e) => {
                    const val = e.target.value.getInt32(0, true);
                    document.getElementById('hall1Display').innerText = val;
                });

                await hall2Characteristic.startNotifications();
                hall2Characteristic.addEventListener('characteristicvaluechanged', (e) => {
                    const val = e.target.value.getInt32(0, true);
                    document.getElementById('hall2Display').innerText = val;
                });

                updateUI('connected');
                await refreshCalibrationStatus();
                console.log('BLE Connected');
            } catch (error) {
                console.error('Connection failed:', error);
                updateUI('disconnected');
            }
        }

        function onDisconnected() {
            console.log('BLE Disconnected');
            ledCharacteristic = null;
            motorCharacteristic = null;
            if (tempCharacteristic) {
                tempCharacteristic.removeEventListener('characteristicvaluechanged', handleTemperatureChange);
                tempCharacteristic = null;
            }
            if (hall1Characteristic) hall1Characteristic = null;
            if (hall2Characteristic) hall2Characteristic = null;
            if (switchCharacteristic) switchCharacteristic = null;
            if (calibrationStatusCharacteristic) calibrationStatusCharacteristic = null;
            if (calibrationCommandCharacteristic) calibrationCommandCharacteristic = null;
            updateUI('disconnected');
        }

        function handleTemperatureChange(event) {
            const value = event.target.value;
            // Decode int32 (little endian)
            const tempEncoded = value.getInt32(0, true);
            const tempFloat = (tempEncoded / 100).toFixed(2);
            document.getElementById('tempDisplay').innerText = tempFloat + ' °C';
            console.log("Temperature updated: " + tempFloat);
        }

        function updateCalibrationSummary(status) {
            calibrationSummary.innerHTML =
                `Hall1 L: idle ${status.hall1Idle}, press ${status.hall1Press}, th ${status.hall1Threshold}, rel ${status.hall1Release}${status.hall1Ready ? ' [ok]' : ''}<br>` +
                `Hall2 R: idle ${status.hall2Idle}, press ${status.hall2Press}, th ${status.hall2Threshold}, rel ${status.hall2Release}${status.hall2Ready ? ' [ok]' : ''}<br>` +
                `active ${status.activeCommand}, samples ${status.sampleCount}/8`;
        }

        async function refreshCalibrationStatus() {
            if (!calibrationStatusCharacteristic) return;

            const value = await calibrationStatusCharacteristic.readValue();
            const status = {
                hall1Idle: value.getInt32(0, true),
                hall1Press: value.getInt32(4, true),
                hall1Threshold: value.getInt32(8, true),
                hall1Release: value.getInt32(12, true),
                hall2Idle: value.getInt32(16, true),
                hall2Press: value.getInt32(20, true),
                hall2Threshold: value.getInt32(24, true),
                hall2Release: value.getInt32(28, true),
                activeCommand: value.getUint8(32),
                sampleCount: value.getUint8(33),
                hall1Ready: value.getUint8(34) === 1,
                hall2Ready: value.getUint8(35) === 1
            };

            updateCalibrationSummary(status);
        }

        async function sendCalibrationCommand(command) {
            if (!calibrationCommandCharacteristic) return;

            try {
                calHall1IdleBtn.disabled = true;
                calHall1PressBtn.disabled = true;
                calHall2IdleBtn.disabled = true;
                calHall2PressBtn.disabled = true;
                refreshCalBtn.disabled = true;
                updateUI('transmitting');
                await calibrationCommandCharacteristic.writeValue(new Uint8Array([command]));
                await new Promise(resolve => setTimeout(resolve, 500));
                await refreshCalibrationStatus();
            } catch (error) {
                console.error('Calibration failed:', error);
                alert('캘리 명령 실패: ' + error.message);
            } finally {
                if (bluetoothDevice && bluetoothDevice.gatt.connected) {
                    calHall1IdleBtn.disabled = false;
                    calHall1PressBtn.disabled = false;
                    calHall2IdleBtn.disabled = false;
                    calHall2PressBtn.disabled = false;
                    refreshCalBtn.disabled = false;
                }
            }
        }

        async function sendLedCommand(value) {
            if (!ledCharacteristic) {
                alert('기기가 연결되어 있지 않습니다.');
                return;
            }

            try {
                // 버튼을 비활성화해서 연타 방지
                ledOnBtn.disabled = true;
                ledOffBtn.disabled = true;

                updateUI('transmitting');
                let data = new Uint8Array([value]);

                // 블루투스 명령 전송 (await로 끝날 때까지 대기)
                await ledCharacteristic.writeValue(data);

                if (value === 1) {
                    ledIndicator.classList.add('on');
                } else {
                    ledIndicator.classList.remove('on');
                }

                console.log(`Command Sent: ${value === 1 ? 'ON' : 'OFF'}`);
            } catch (error) {
                console.error('Send failed:', error);
                alert('전송에 실패했습니다: ' + error.message);
            } finally {
                // 성공하든 실패하든 다시 버튼 활성화
                ledOnBtn.disabled = false;
                ledOffBtn.disabled = false;
            }
        }

        async function playVibration(intensity, duration) {
            if (!motorCharacteristic) return;
            try {
                vibShortBtn.disabled = true;
                vibLongBtn.disabled = true;
                updateUI('transmitting');
                await motorCharacteristic.writeValue(new Uint8Array([intensity]));
                setTimeout(async () => {
                    if (motorCharacteristic) {
                        try {
                            await motorCharacteristic.writeValue(new Uint8Array([0]));
                        } catch (err) { }
                    }
                    vibShortBtn.disabled = false;
                    vibLongBtn.disabled = false;
                }, duration);
            } catch (error) {
                console.error('Vibration failed:', error);
                vibShortBtn.disabled = false;
                vibLongBtn.disabled = false;
            }
        }

        async function sendSwitchCommand(value) {
            if (!switchCharacteristic) return;
            try {
                switchOnBtn.disabled = true;
                switchOffBtn.disabled = true;
                updateUI('transmitting');
                await switchCharacteristic.writeValue(new Uint8Array([value]));
            } catch (error) {
                console.error('Switch failed:', error);
            } finally {
                switchOnBtn.disabled = false;
                switchOffBtn.disabled = false;
            }
        }

        connectBtn.addEventListener('click', toggleConnection);
        ledOnBtn.addEventListener('click', () => sendLedCommand(1));
        ledOffBtn.addEventListener('click', () => sendLedCommand(0));
        vibShortBtn.addEventListener('click', () => playVibration(200, 50));
        vibLongBtn.addEventListener('click', () => playVibration(200, 300));
        switchOnBtn.addEventListener('click', () => sendSwitchCommand(1));
        switchOffBtn.addEventListener('click', () => sendSwitchCommand(0));
        calHall1IdleBtn.addEventListener('click', () => sendCalibrationCommand(CAL_CMD_HALL1_IDLE));
        calHall1PressBtn.addEventListener('click', () => sendCalibrationCommand(CAL_CMD_HALL1_PRESS));
        calHall2IdleBtn.addEventListener('click', () => sendCalibrationCommand(CAL_CMD_HALL2_IDLE));
        calHall2PressBtn.addEventListener('click', () => sendCalibrationCommand(CAL_CMD_HALL2_PRESS));
        refreshCalBtn.addEventListener('click', refreshCalibrationStatus);
    </script>
</body>

</html>
