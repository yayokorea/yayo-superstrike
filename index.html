<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProMicro BLE Web Control</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');

        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --success: #00e676;
            --danger: #ff1744;
            --bg-dark: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top left, #1e1e24, var(--bg-dark), #000000);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Background animated blobs */
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            z-index: 0;
            animation: float 10s infinite alternate cubic-bezier(0.45, 0.05, 0.55, 0.95);
        }

        .blob-1 {
            width: 400px;
            height: 400px;
            background: var(--primary);
            top: -100px;
            left: -100px;
        }

        .blob-2 {
            width: 300px;
            height: 300px;
            background: var(--secondary);
            bottom: -50px;
            right: -50px;
            animation-delay: -5s;
        }

        @keyframes float {
            0% {
                transform: translate(0, 0) scale(1);
            }

            100% {
                transform: translate(30px, 50px) scale(1.1);
            }
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            width: 90%;
            max-width: 420px;
            box-shadow: var(--glass-shadow);
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .glass-panel:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px 0 rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 2rem;
            margin: 0 0 10px 0;
            background: linear-gradient(90deg, #fff, #a5b4fc);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
            text-align: center;
        }

        p.subtitle {
            color: #94a3b8;
            font-size: 0.9rem;
            margin-bottom: 30px;
            text-align: center;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 20px;
            border-radius: 30px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            margin-bottom: 30px;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.4s ease;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #cbd5e1;
            box-shadow: 0 0 10px transparent;
            transition: all 0.4s ease;
        }

        .status-badge.connected {
            border-color: rgba(0, 230, 118, 0.4);
        }

        .status-badge.connected .status-dot {
            background: var(--success);
            box-shadow: 0 0 12px var(--success);
        }

        .status-badge.active .status-dot {
            background: var(--primary);
            box-shadow: 0 0 15px var(--primary);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(0, 210, 255, 0.7);
            }

            70% {
                box-shadow: 0 0 0 10px rgba(0, 210, 255, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(0, 210, 255, 0);
            }
        }

        .btn {
            width: 100%;
            padding: 16px;
            margin-bottom: 15px;
            border: none;
            border-radius: 14px;
            font-family: inherit;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            color: white;
            backdrop-filter: blur(5px);
        }

        /* Hover ripple effect setup */
        .btn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.4s ease, height 0.4s ease;
        }

        .btn:hover::after {
            width: 300px;
            height: 300px;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn:disabled::after {
            display: none;
        }

        .btn-connect {
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            box-shadow: 0 4px 15px rgba(58, 123, 213, 0.4);
        }

        .btn-connect.disconnect {
            background: linear-gradient(135deg, #475569, #1e293b);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .controls-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
        }

        .btn-on {
            background: rgba(0, 230, 118, 0.2);
            border: 1px solid rgba(0, 230, 118, 0.4);
            color: #b9f6ca;
            margin: 0;
        }

        .btn-on:hover:not(:disabled) {
            background: rgba(0, 230, 118, 0.3);
            box-shadow: 0 0 20px rgba(0, 230, 118, 0.4);
        }

        .btn-off {
            background: rgba(255, 23, 68, 0.2);
            border: 1px solid rgba(255, 23, 68, 0.4);
            color: #ff8a80;
            margin: 0;
        }

        .btn-off:hover:not(:disabled) {
            background: rgba(255, 23, 68, 0.3);
            box-shadow: 0 0 20px rgba(255, 23, 68, 0.4);
        }

        .led-indicator {
            width: 80px;
            height: 80px;
            margin: 20px 0;
            border-radius: 50%;
            background: #1e293b;
            border: 4px solid #334155;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.5);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .led-indicator::before {
            content: '';
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            filter: blur(4px);
            transition: all 0.5s ease;
        }

        .led-indicator.on {
            background: #0ea5e9;
            border-color: #38bdf8;
            box-shadow: 0 0 40px #0ea5e9, inset 0 0 20px rgba(255, 255, 255, 0.8);
        }

        .led-indicator.on::before {
            background: rgba(255, 255, 255, 0.9);
            filter: blur(2px);
        }
    </style>
</head>

<body>

    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="glass-panel">
        <h1>ProMicro Control</h1>
        <p class="subtitle">Web Bluetooth Experience</p>

        <div id="statusBadge" class="status-badge">
            <div id="statusDot" class="status-dot"></div>
            <span id="statusText">연결 대기 중</span>
        </div>

        <div id="ledIndicator" class="led-indicator"></div>

        <button id="connectBtn" class="btn btn-connect">기기 연결하기</button>

        <div class="controls-grid">
            <button id="ledOnBtn" class="btn btn-on" disabled>LED 켜기</button>
            <button id="ledOffBtn" class="btn btn-off" disabled>LED 끄기</button>
        </div>
    </div>

    <script>
        // Updated Custom UUIDs
        const SERVICE_UUID = '2cfd0a83-f013-4fe2-8dbd-fe3a5f4a64ff';
        const CHARACTERISTIC_UUID_LED = '2cfd0a84-f013-4fe2-8dbd-fe3a5f4a64ff';

        let bluetoothDevice = null;
        let ledCharacteristic = null;

        const connectBtn = document.getElementById('connectBtn');
        const ledOnBtn = document.getElementById('ledOnBtn');
        const ledOffBtn = document.getElementById('ledOffBtn');
        const statusText = document.getElementById('statusText');
        const statusBadge = document.getElementById('statusBadge');
        const ledIndicator = document.getElementById('ledIndicator');

        function updateUI(state) {
            switch (state) {
                case 'disconnected':
                    statusText.innerText = '연결 대기 중';
                    statusBadge.className = 'status-badge';
                    connectBtn.innerText = '기기 연결하기';
                    connectBtn.classList.remove('disconnect');

                    ledOnBtn.disabled = true;
                    ledOffBtn.disabled = true;
                    ledIndicator.classList.remove('on');
                    break;
                case 'connecting':
                    statusText.innerText = '연결 시도 중...';
                    statusBadge.className = 'status-badge';
                    break;
                case 'connected':
                    statusText.innerText = '연결 성공!';
                    statusBadge.className = 'status-badge connected';
                    connectBtn.innerText = '연결 해제하기';
                    connectBtn.classList.add('disconnect');

                    ledOnBtn.disabled = false;
                    ledOffBtn.disabled = false;
                    break;
                case 'transmitting':
                    statusBadge.className = 'status-badge connected active';
                    setTimeout(() => {
                        if (bluetoothDevice && bluetoothDevice.gatt.connected) {
                            statusBadge.className = 'status-badge connected';
                        }
                    }, 500);
                    break;
            }
        }

        async function toggleConnection() {
            if (bluetoothDevice && bluetoothDevice.gatt.connected) {
                bluetoothDevice.gatt.disconnect();
            } else {
                await connectToDevice();
            }
        }

        async function connectToDevice() {
            try {
                updateUI('connecting');

                bluetoothDevice = await navigator.bluetooth.requestDevice({
                    filters: [{ services: [SERVICE_UUID] }]
                });

                bluetoothDevice.addEventListener('gattserverdisconnected', onDisconnected);

                const server = await bluetoothDevice.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                ledCharacteristic = await service.getCharacteristic(CHARACTERISTIC_UUID_LED);

                updateUI('connected');
                console.log('BLE Connected');
            } catch (error) {
                console.error('Connection failed:', error);
                updateUI('disconnected');
            }
        }

        function onDisconnected() {
            console.log('BLE Disconnected');
            ledCharacteristic = null;
            updateUI('disconnected');
        }

        async function sendLedCommand(value) {
            if (!ledCharacteristic) {
                alert('기기가 연결되어 있지 않습니다.');
                return;
            }

            try {
                // 버튼을 비활성화해서 연타 방지
                ledOnBtn.disabled = true;
                ledOffBtn.disabled = true;

                updateUI('transmitting');
                let data = new Uint8Array([value]);

                // 블루투스 명령 전송 (await로 끝날 때까지 대기)
                await ledCharacteristic.writeValue(data);

                if (value === 1) {
                    ledIndicator.classList.add('on');
                } else {
                    ledIndicator.classList.remove('on');
                }

                console.log(`Command Sent: ${value === 1 ? 'ON' : 'OFF'}`);
            } catch (error) {
                console.error('Send failed:', error);
                alert('전송에 실패했습니다: ' + error.message);
            } finally {
                // 성공하든 실패하든 다시 버튼 활성화
                ledOnBtn.disabled = false;
                ledOffBtn.disabled = false;
            }
        }

        connectBtn.addEventListener('click', toggleConnection);
        ledOnBtn.addEventListener('click', () => sendLedCommand(1));
        ledOffBtn.addEventListener('click', () => sendLedCommand(0));
    </script>
</body>

</html>
